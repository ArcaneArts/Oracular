<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ============================================================
       PAGE BASICS
       Update title + description per environment / per deployment.
       Per-page overrides come from lib/seo/seo.dart via Document.head.
       ============================================================ -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArcaneJasprApp</title>
  <meta name="description" content="A modern web application built with Jaspr and Arcane UI">
  <meta name="generator" content="Jaspr + Arcane">
  <meta name="author" content="ArcaneJasprApp">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#10b981">
  <meta name="color-scheme" content="dark light">
  <meta name="format-detection" content="telephone=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <!-- ============================================================
       CANONICAL URL
       Replace https://example.com with your real domain. The Seo
       widget overrides this per-page when you set canonicalPath.
       ============================================================ -->
  <link rel="canonical" href="https://example.com/">

  <!-- ============================================================
       OPEN GRAPH (Facebook, LinkedIn, Discord, Slack, iMessage...)
       ============================================================ -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="ArcaneJasprApp">
  <meta property="og:title" content="ArcaneJasprApp">
  <meta property="og:description" content="A modern web application built with Jaspr and Arcane UI">
  <meta property="og:url" content="https://example.com/">
  <meta property="og:image" content="https://example.com/assets/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="ArcaneJasprApp">
  <meta property="og:locale" content="en_US">

  <!-- ============================================================
       TWITTER / X CARD
       ============================================================ -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ArcaneJasprApp">
  <meta name="twitter:description" content="A modern web application built with Jaspr and Arcane UI">
  <meta name="twitter:image" content="https://example.com/assets/og-image.png">
  <!-- <meta name="twitter:site" content="@yourhandle"> -->
  <!-- <meta name="twitter:creator" content="@yourhandle"> -->

  <!-- ============================================================
       FAVICONS + PWA MANIFEST
       Recommended icon sources at https://realfavicongenerator.net
       ============================================================ -->
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/icon.png">
  <link rel="mask-icon" href="/assets/icon.png" color="#10b981">
  <link rel="manifest" href="/manifest.webmanifest">

  <!-- ============================================================
       STRUCTURED DATA (JSON-LD)
       Site-wide WebSite + Organization schema. Per-page schemas
       (Article, FAQPage, BreadcrumbList...) are emitted by the
       StructuredData widget at runtime.
       ============================================================ -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "ArcaneJasprApp",
    "url": "https://example.com/"
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "ArcaneJasprApp",
    "url": "https://example.com/",
    "logo": "https://example.com/assets/icon.png"
  }
  </script>

  <!-- ============================================================
       PERFORMANCE: preconnect + dns-prefetch for common origins
       ============================================================ -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- ============================================================
       THEME BOOT (prevents FOUC)
       ============================================================ -->
  <script>
    (function() {
      var savedTheme = localStorage.getItem('arcane-theme-preset') || 'green';
      var savedMode = localStorage.getItem('arcane-theme-mode') || 'dark';
      document.documentElement.className = 'theme-' + savedTheme + '-' + savedMode;
    })();
  </script>

  <!-- Global CSS Reset and Loading Screen -->
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      background-color: var(--arcane-background, #09090b);
      color: var(--arcane-on-background, #fafafa);
    }
    body {
      font-family: 'GeistSans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    /* Loading state */
    .loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--arcane-background, #09090b);
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    .loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid var(--arcane-border, #27272a);
      border-top-color: var(--arcane-accent, #10b981);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <!-- Firebase SDKs (uncomment if using Firebase) -->
  <!--
  <script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
  </script>
  -->

  <!-- Jaspr generated styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Loading screen shown while Dart loads -->
  <div class="loading-screen" id="loading">
    <div class="loader"></div>
  </div>

  <!-- App root -->
  <div id="app"></div>

  <!-- Hide loading screen when app loads -->
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        document.getElementById('loading').classList.add('hidden');
      }, 100);
    });
  </script>

  <!-- Jaspr compiled Dart -->
  <script defer src="main.client.dart.js"></script>
</body>
</html>
