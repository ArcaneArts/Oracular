name: arcane_jaspr_app
description: "Arcane Jaspr web application"
version: 1.0.0
publish_to: 'none'

environment:
  sdk: ^3.10.0

dependencies:
  web: ^1.1.1
  jaspr: ^0.23.0
  arcane_jaspr: ^3.3.0
  # Renderer package - lives inside the arcane_jaspr monorepo and is not yet
  # published to pub.dev, so we reference it via git with a sub-path.
  arcane_jaspr_shadcn:
    git:
      url: https://github.com/ArcaneArts/arcane_jaspr.git
      path: packages/arcane_jaspr_shadcn
  fast_log: ^1.0.7

  # ─── Server-only dependencies (auto-uncommented for SSR / hybrid) ───────
  # Oracular's TemplateCopier uncomments the block below when the render
  # mode is `ssr` or `hybrid`. Leave commented for CSR / SSG.
  #
  # shelf: ^1.4.2
  # shelf_static: ^1.1.3
  # mime: ^2.0.0

  # Shared models (added automatically when models enabled)
  # arcane_models:
  #   path: ../arcane_models

dev_dependencies:
  build_runner: ^2.14.0
  build_web_compilers: ^4.4.18
  jaspr_builder: ^0.23.0
  lints: ^6.1.0

jaspr:
  mode: client

scripts:
  # Development
  serve: jaspr serve
  serve_release: jaspr serve --release

  # Build (mode-aware via jaspr.yaml; Oracular rewrites it per render mode)
  build: jaspr build

  # Build the SSR/Hybrid Cloud Run image. Uses Dockerfile.jaspr which
  # Oracular drops into the project for ssr/hybrid render modes.
  build_image: docker build -f Dockerfile.jaspr -t arcane-jaspr-app:latest .

  # Clean
  clean: jaspr clean

  # Kill running servers
  killall: pkill -f "jaspr serve" || true

  # Code Generation
  build_runner: dart run build_runner build --delete-conflicting-outputs
  watch: dart run build_runner watch --delete-conflicting-outputs

  # Firebase Deployment (run from parent directory)
  firebase_deploy: jaspr build && cd .. && firebase deploy --only hosting --project FIREBASE_PROJECT_ID

  # Oracular Deployment (works for every render mode)
  oracular_deploy: oracular deploy hosting
  oracular_deploy_jaspr_server: oracular deploy jaspr-server
