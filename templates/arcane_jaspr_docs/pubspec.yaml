name: arcane_jaspr_docs
description: "Arcane Jaspr static documentation site"
version: 1.0.0
publish_to: 'none'

environment:
  sdk: ^3.10.0

dependencies:
  web: ^1.1.1
  jaspr: ^0.23.0
  arcane_jaspr: ^3.3.0
  # Renderer + lexicon packages live in their respective monorepos and are not
  # yet published to pub.dev, so we reference them via git.
  arcane_jaspr_shadcn:
    git:
      url: https://github.com/ArcaneArts/arcane_jaspr.git
      path: packages/arcane_jaspr_shadcn
  arcane_lexicon:
    git:
      url: https://github.com/ArcaneArts/arcane_lexicon.git

  # Shared models (added automatically when models enabled)
  # arcane_models:
  #   path: ../arcane_models

dev_dependencies:
  build_runner: ^2.14.0
  build_web_compilers: ^4.4.18
  jaspr_builder: ^0.23.0
  lints: ^6.1.0

jaspr:
  mode: static

scripts:
  # Development
  serve: jaspr serve
  serve_release: jaspr serve --release

  # Build
  build: jaspr build

  # Clean
  clean: jaspr clean

  # Kill running servers
  killall: pkill -f "jaspr serve" || true

  # Firebase Deployment (run from parent directory)
  firebase_deploy: jaspr build && cd .. && firebase deploy --only hosting --project FIREBASE_PROJECT_ID

  # Oracular Deployment (works for static docs sites)
  oracular_deploy: oracular deploy hosting

# ─────────────────────────────────────────────────────────────────────────
# Render mode
#
# This template is **always** rendered in `mode: static` (SSG). The
# documentation site uses `arcane_lexicon` which prerenders every page
# at build time from the markdown sources in `content/`. There is no
# Cloud Run service for arcane_jaspr_docs.
#
# If you need a paywalled / auth-gated docs experience (a future v2
# feature), switch to the `arcane_jaspr_app` template with
# `JASPR_RENDER_MODE=ssr`. The render-mode wizard prompt is skipped for
# this template — see `interactive_wizard.dart` for the gating logic.
# ─────────────────────────────────────────────────────────────────────────
